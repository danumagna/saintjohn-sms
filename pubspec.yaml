name: saintjohn_sms_mobile
description: "Saint John School Management System - Mobile Application for Parents and Students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # UI/Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  
  # Forms & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # Utils
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.3
  gap: ^3.0.1

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # Calendar
  table_calendar: ^3.1.3

  # URL Launcher
  url_launcher: ^6.3.1

  # Image Picker
  image_picker: ^1.1.2

  # Network
  dio: ^5.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.6
  freezed_annotation: ^3.0.0
  json_serializable: ^6.9.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/saintjohnlogo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/saintjohnlogo.png"
    background_color: "#1565C0"
    theme_color: "#1565C0"
  windows:
    generate: true
    image_path: "assets/icons/saintjohnlogo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/saintjohnlogo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/illustrations/
    - assets/images/avatars/
